# myflume.conf
# Flume agent configuration to tail highfreq_sensor_generated.log and device_state_generated.log to Kafka

# 1. Name the components on this agent
a1.sources = r_highfreq r_lowfreq
a1.sinks = k_highfreq k_lowfreq
a1.channels = c_highfreq c_lowfreq

# 2. Configure the Source for High Frequency Sensor Data
a1.sources.r_highfreq.type = exec
a1.sources.r_highfreq.command = tail -F /data_log/highfreq_sensor_generated.log
a1.sources.r_highfreq.batchSize = 100
a1.sources.r_highfreq.batchTimeout = 1000
a1.sources.r_highfreq.interceptors = i1
a1.sources.r_highfreq.interceptors.i1.type = static
a1.sources.r_highfreq.interceptors.i1.key = topic_type
a1.sources.r_highfreq.interceptors.i1.value = highfreq

# 3. Configure the Source for Low Frequency Device State Data
a1.sources.r_lowfreq.type = exec
a1.sources.r_lowfreq.command = tail -F /data_log/device_state_generated.log
a1.sources.r_lowfreq.batchSize = 100
a1.sources.r_lowfreq.batchTimeout = 1000
a1.sources.r_lowfreq.interceptors = i2
a1.sources.r_lowfreq.interceptors.i2.type = static
a1.sources.r_lowfreq.interceptors.i2.key = topic_type
a1.sources.r_lowfreq.interceptors.i2.value = lowfreq

# 4. Configure the Sink for High Frequency Data (Kafka)
a1.sinks.k_highfreq.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.k_highfreq.kafka.topic = highfreq_sensor
a1.sinks.k_highfreq.kafka.bootstrap.servers = master:9092
a1.sinks.k_highfreq.kafka.flumeBatchSize = 20
a1.sinks.k_highfreq.kafka.producer.acks = 1

# 5. Configure the Sink for Low Frequency Data (Kafka)
a1.sinks.k_lowfreq.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.k_lowfreq.kafka.topic = lowfreq_sensor
a1.sinks.k_lowfreq.kafka.bootstrap.servers = master:9092
a1.sinks.k_lowfreq.kafka.flumeBatchSize = 20
a1.sinks.k_lowfreq.kafka.producer.acks = 1

# 6. Configure the Channels
a1.channels.c_highfreq.type = memory
a1.channels.c_highfreq.capacity = 10000
a1.channels.c_highfreq.transactionCapacity = 1000

a1.channels.c_lowfreq.type = memory
a1.channels.c_lowfreq.capacity = 10000
a1.channels.c_lowfreq.transactionCapacity = 1000

# 7. Bind the source and sink to the channel
a1.sources.r_highfreq.channels = c_highfreq
a1.sinks.k_highfreq.channel = c_highfreq

a1.sources.r_lowfreq.channels = c_lowfreq
a1.sinks.k_lowfreq.channel = c_lowfreq
