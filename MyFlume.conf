# Flume Config - Multi Source/Channel/Sink
# Updated: Add 3 new sources (device_state, sensor_metrics, highfreq_sensor)
# Note: New sources only send to Kafka (no HDFS backup)

# ==================== Agent ====================
a1.sources=i1 i2 i3 i4 i5 i6
a1.channels=c1 c2 c3 c4 c5 c6 c7 c8 c9
a1.sinks=o1 o2 o3 o4 o5 o6 o7 o8 o9

# ==================== Sources ====================

# Source 1: sensor_raw.log -> Kafka + HDFS
a1.sources.i1.type=exec
a1.sources.i1.command=tail -F /data_log/sensor_raw.log
a1.sources.i1.batchSize=1000
a1.sources.i1.channels=c1 c2

# Source 2: log_raw.log -> Kafka + HDFS
a1.sources.i2.type=exec
a1.sources.i2.command=tail -F /data_log/log_raw.log
a1.sources.i2.batchSize=1000
a1.sources.i2.channels=c3 c4

# Source 3: ChangeRecord -> Kafka + HDFS
a1.sources.i3.type=exec
a1.sources.i3.command=tail -F /data_log/*-changerecord.csv
a1.sources.i3.batchSize=1000
a1.sources.i3.channels=c5 c6

# Source 4: device_state -> Kafka only
a1.sources.i4.type=exec
a1.sources.i4.command=tail -F /data_log/device_state_generated.log
a1.sources.i4.batchSize=1000
a1.sources.i4.channels=c7

# Source 5: sensor_metrics -> Kafka only
a1.sources.i5.type=exec
a1.sources.i5.command=tail -F /data_log/sensor_metrics_generated.log
a1.sources.i5.batchSize=1000
a1.sources.i5.channels=c8

# Source 6: highfreq_sensor -> Kafka only
a1.sources.i6.type=exec
a1.sources.i6.command=tail -F /data_log/highfreq_sensor_generated.log
a1.sources.i6.batchSize=1000
a1.sources.i6.channels=c9

# ==================== Channels ====================

# Channels 1-2 (sensor_raw)
a1.channels.c1.type=memory
a1.channels.c1.capacity=100000
a1.channels.c1.transactionCapacity=10000
a1.channels.c2.type=memory
a1.channels.c2.capacity=100000
a1.channels.c2.transactionCapacity=10000

# Channels 3-4 (log_raw)
a1.channels.c3.type=memory
a1.channels.c3.capacity=100000
a1.channels.c3.transactionCapacity=10000
a1.channels.c4.type=memory
a1.channels.c4.capacity=100000
a1.channels.c4.transactionCapacity=10000

# Channels 5-6 (ChangeRecord)
a1.channels.c5.type=memory
a1.channels.c5.capacity=100000
a1.channels.c5.transactionCapacity=10000
a1.channels.c6.type=memory
a1.channels.c6.capacity=100000
a1.channels.c6.transactionCapacity=10000

# Channel 7 (device_state) - Kafka only
a1.channels.c7.type=memory
a1.channels.c7.capacity=100000
a1.channels.c7.transactionCapacity=10000

# Channel 8 (sensor_metrics) - Kafka only
a1.channels.c8.type=memory
a1.channels.c8.capacity=100000
a1.channels.c8.transactionCapacity=10000

# Channel 9 (highfreq_sensor) - Kafka only
a1.channels.c9.type=memory
a1.channels.c9.capacity=100000
a1.channels.c9.transactionCapacity=10000

# ==================== Sinks ====================

# Sink 1: sensor_raw -> Kafka
a1.sinks.o1.type=org.apache.flume.sink.kafka.KafkaSink
a1.sinks.o1.kafka.topic=sensor_raw
a1.sinks.o1.kafka.bootstrap.servers=master:9092
a1.sinks.o1.kafka.flumeBatchSize=1000
a1.sinks.o1.kafka.producer.acks=1
a1.sinks.o1.kafka.producer.linger.ms=5
a1.sinks.o1.kafka.producer.compression.type=snappy
a1.sinks.o1.channel=c1

# Sink 2: sensor_raw -> HDFS
a1.sinks.o2.type=hdfs
a1.sinks.o2.hdfs.path=hdfs://master:8020/hudi/ods/sensor-raw
a1.sinks.o2.hdfs.filePrefix=sensor-raw-
a1.sinks.o2.hdfs.fileType=DataStream
a1.sinks.o2.hdfs.writeFormat=text
a1.sinks.o2.hdfs.useLocalTimeStamp=true
a1.sinks.o2.hdfs.rollInterval=30
a1.sinks.o2.hdfs.rollSize=1048576
a1.sinks.o2.hdfs.rollCount=0
a1.sinks.o2.hdfs.batchSize=1000
a1.sinks.o2.channel=c2

# Sink 3: log_raw -> Kafka
a1.sinks.o3.type=org.apache.flume.sink.kafka.KafkaSink
a1.sinks.o3.kafka.topic=log_raw
a1.sinks.o3.kafka.bootstrap.servers=master:9092
a1.sinks.o3.kafka.flumeBatchSize=1000
a1.sinks.o3.kafka.producer.acks=1
a1.sinks.o3.kafka.producer.linger.ms=5
a1.sinks.o3.kafka.producer.compression.type=snappy
a1.sinks.o3.channel=c3

