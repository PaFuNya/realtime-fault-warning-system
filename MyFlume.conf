# ============================================================
#  Flume 配置: 全量数据采集 → Kafka (+ HDFS备份仅旧数据)
#
#  ┌─ 旧数据源 (带HDFS备份) ─────────────────────────────┐
#  │  sensor_raw.log     → Kafka(sensor_raw) + HDFS      │
#  │  log_raw.log         → Kafka(log_raw)   + HDFS      │
#  │  ChangeRecord.csv    → Kafka(ChangeRecord) + HDFS    │
#  └──────────────────────────────────────────────────────┘
#
#  ── 新数据源 (仅Kafka, 无HDFS) ─────────────────────────
#     device_state_generated.log    → device_state
#     sensor_metrics_generated.log  → sensor_metrics
#     highfreq_sensor_generated.log → highfreq_sensor
#
#  用法:
#    flume-ng agent -n a1 -f /path/to/MyFlume.conf
# ============================================================

a1.sources = i1 i2 i3 s1 s2 s3
a1.channels = c1 c2 c3 c4 c5 c6 k1 k2 k3
a1.sinks = o1 o2 o3 o4 o5 o6 kafka1 kafka2 kafka3


# ════════════════════════════════════════════════════════
#  SOURCES (6个)
# ════════════════════════════════════════════════════════

# --- 旧 Source 1: sensor_raw ---
a1.sources.i1.type = exec
a1.sources.i1.command = tail -F /data_log/sensor_raw.log
a1.sources.i1.batchSize = 1000
a1.sources.i1.channels = c1 c2

# --- 旧 Source 2: log_raw ---
a1.sources.i2.type = exec
a1.sources.i2.command = tail -F /data_log/log_raw.log
a1.sources.i2.batchSize = 1000
a1.sources.i2.channels = c3 c4

# --- 旧 Source 3: ChangeRecord ---
a1.sources.i3.type = exec
a1.sources.i3.command = tail -F /data_log/2026-04-05@08:31-changerecord.csv
a1.sources.i3.batchSize = 1000
a1.sources.i3.channels = c5 c6

# --- 新 Source 4: device_state (状态日志) ---
a1.sources.s1.type = exec
a1.sources.s1.command = tail -F /data_log/device_state_generated.log
a1.sources.s1.batchSize = 1000
a1.sources.s1.channels = k1

# --- 新 Source 5: sensor_metrics (传感器数据) ---
a1.sources.s2.type = exec
a1.sources.s2.command = tail -F /data_log/sensor_metrics_generated.log
a1.sources.s2.batchSize = 1000
a1.sources.s2.channels = k2

# --- 新 Source 6: highfreq_sensor (高频时序) ---
a1.sources.s3.type = exec
a1.sources.s3.command = tail -F /data_log/highfreq_sensor_generated.log
a1.sources.s3.batchSize = 1000
a1.sources.s3.channels = k3


# ════════════════════════════════════════════════════════
#  CHANNELS (9个)
# ════════════════════════════════════════════════════════

# --- 旧 Channel (Kafka+HDFS 双写) ---
a1.channels.c1.type = memory
a1.channels.c1.capacity = 100000
a1.channels.c1.transactionCapacity = 10000

a1.channels.c2.type = memory
a1.channels.c2.capacity = 100000
a1.channels.c2.transactionCapacity = 10000

a1.channels.c3.type = memory
a1.channels.c3.capacity = 100000
a1.channels.c3.transactionCapacity = 10000

a1.channels.c4.type = memory
a1.channels.c4.capacity = 100000
a1.channels.c4.transactionCapacity = 10000

a1.channels.c5.type = memory
a1.channels.c5.capacity = 100000
a1.channels.c5.transactionCapacity = 10000

a1.channels.c6.type = memory
a1.channels.c6.capacity = 100000
a1.channels.c6.transactionCapacity = 10000

# --- 新 Channel (仅Kafka, 无HDFS) ---
a1.channels.k1.type = memory
a1.channels.k1.capacity = 100000
a1.channels.k1.transactionCapacity = 10000

a1.channels.k2.type = memory
a1.channels.k2.capacity = 100000
a1.channels.k2.transactionCapacity = 10000

# 高频数据量大，调大容量
a1.channels.k3.type = memory
a1.channels.k3.capacity = 500000
a1.channels.k3.transactionCapacity = 20000


# ════════════════════════════════════════════════════════
#  SINKS (9个)
# ════════════════════════════════════════════════════════

# ─── 旧 Sink: Kafka + HDFS 双写 ---

# sink 1: sensor_raw → Kafka + HDFS
a1.sinks.o1.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.o1.kafka.topic = sensor_raw
a1.sinks.o1.kafka.bootstrap.servers = master:9092
a1.sinks.o1.kafka.flumeBatchSize = 1000
a1.sinks.o1.kafka.producer.acks = 1
a1.sinks.o1.kafka.producer.linger.ms = 5
a1.sinks.o1.kafka.producer.compression.type = snappy
a1.sinks.o1.channel = c1

a1.sinks.o2.type = hdfs
a1.sinks.o2.hdfs.path = hdfs://master:8020/hudi/ods/sensor-raw
a1.sinks.o2.hdfs.filePrefix = sensor-raw-
a1.sinks.o2.hdfs.fileType = DataStream
a1.sinks.o2.hdfs.writeFormat = text
a1.sinks.o2.hdfs.useLocalTimeStamp = true
a1.sinks.o2.hdfs.rollInterval = 30
a1.sinks.o2.hdfs.rollSize = 1048576
a1.sinks.o2.hdfs.rollCount = 0
a1.sinks.o2.hdfs.batchSize = 1000
a1.sinks.o2.channel = c2

# sink 3: log_raw → Kafka + HDFS
a1.sinks.o3.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.o3.kafka.topic = log_raw
a1.sinks.o3.kafka.bootstrap.servers = master:9092
a1.sinks.o3.kafka.flumeBatchSize = 1000
a1.sinks.o3.kafka.producer.acks = 1
a1.sinks.o3.kafka.producer.linger.ms = 5
a1.sinks.o3.kafka.producer.compression.type = snappy
a1.sinks.o3.channel = c3

a1.sinks.o4.type = hdfs
a1.sinks.o4.hdfs.path = hdfs://master:8020/hudi/ods/log-raw
a1.sinks.o4.hdfs.filePrefix = log-raw
a1.sinks.o4.hdfs.fileType = DataStream
a1.sinks.o4.hdfs.writeFormat = text
a1.sinks.o4.hdfs.useLocalTimeStamp = true
a1.sinks.o4.hdfs.rollInterval = 30
a1.sinks.o4.hdfs.rollSize = 1048576
a1.sinks.o4.hdfs.rollCount = 0
a1.sinks.o4.hdfs.batchSize = 1000
a1.sinks.o4.channel = c4

# sink 5: ChangeRecord → Kafka + HDFS
a1.sinks.o5.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.o5.kafka.topic = ChangeRecord
a1.sinks.o5.kafka.bootstrap.servers = master:9092
a1.sinks.o5.kafka.flumeBatchSize = 1000
a1.sinks.o5.kafka.producer.acks = 1
a1.sinks.o5.kafka.producer.linger.ms = 5
a1.sinks.o5.kafka.producer.compression.type = snappy
a1.sinks.o5.channel = c5

a1.sinks.o6.type = hdfs
a1.sinks.o6.hdfs.path = hdfs://master:8020/hudi/ods/change-record
a1.sinks.o6.hdfs.filePrefix = change-record
a1.sinks.o6.hdfs.fileType = DataStream
a1.sinks.o6.hdfs.writeFormat = text
a1.sinks.o6.hdfs.useLocalTimeStamp = true
a1.sinks.o6.hdfs.rollInterval = 30
a1.sinks.o6.hdfs.rollSize = 1048576
a1.sinks.o6.hdfs.rollCount = 0
a1.sinks.o6.hdfs.batchSize = 1000
a1.sinks.o6.channel = c6

# ─── 新 Sink: 仅Kafka (无HDFS) ---

# sink kafka1: device_state → Kafka topic: device_state
a1.sinks.kafka1.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.kafka1.kafka.topic = device_state
a1.sinks.kafka1.kafka.bootstrap.servers = master:9092
a1.sinks.kafka1.kafka.flumeBatchSize = 1000
a1.sinks.kafka1.kafka.producer.acks = 1
a1.sinks.kafka1.kafka.producer.linger.ms = 5
a1.sinks.kafka1.kafka.producer.compression.type = snappy
a1.sinks.kafka1.channel = k1

# sink kafka2: sensor_metrics → Kafka topic: sensor_metrics
a1.sinks.kafka2.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.kafka2.kafka.topic = sensor_metrics
a1.sinks.kafka2.kafka.bootstrap.servers = master:9092
a1.sinks.kafka2.kafka.flumeBatchSize = 1000
a1.sinks.kafka2.kafka.producer.acks = 1
a1.sinks.kafka2.kafka.producer.linger.ms = 5
a1.sinks.kafka2.kafka.producer.compression.type = snappy
a1.sinks.kafka2.channel = k2

# sink kafka3: highfreq_sensor → Kafka topic: highfreq_sensor
# 高频数据: 减小延迟 + 增大批次
a1.sinks.kafka3.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.kafka3.kafka.topic = highfreq_sensor
a1.sinks.kafka3.kafka.bootstrap.servers = master:9092
a1.sinks.kafka3.kafka.flumeBatchSize = 2000
a1.sinks.kafka3.kafka.producer.acks = 1
a1.sinks.kafka3.kafka.producer.linger.ms = 2
a1.sinks.kafka3.kafka.producer.compression.type = snappy
a1.sinks.kafka3.channel = k3
