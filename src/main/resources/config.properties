# Kafka / ClickHouse
kafka.brokers=master:9092,slave1:9092,slave2:9092
kafka.alert_topic=alert_topic
clickhouse.url=jdbc:clickhouse://master:8123/ldc

# Redis
redis.host=master
redis.port=6379

# Lateness and interpolation
max_allowed_lateness_seconds=30
interpolation.max_gap_seconds=5
interpolation.step_seconds=1

# Thresholds
threshold.temperature=80.0
threshold.vibration=2.0
vibration.spike.percent=0.2
device_health.min_update_seconds=60

# Deviation threshold for process deviation
deviation.threshold=0.028

# ==========================================
# MySQL (ChangeRecord 数据清洗用)
# ==========================================
mysql.jdbc.url=jdbc:mysql://master:3306/shtd_industry?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
mysql.user=root
mysql.password=123456
mysql.change_record_table=ChangeRecord

# ==========================================
# Kafka 新 Topic (14维特征输出)
# ==========================================
kafka.device_metrics_topic=device_metrics
kafka.device_state_topic=device_state

# ==========================================
# 数据清洗输出目录
# ==========================================
output.base.path=/data/output/change_data
