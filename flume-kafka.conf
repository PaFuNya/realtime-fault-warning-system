# flume-kafka.conf
# Flume agent configuration to tail sensor_raw.log and log_raw.log and sink to Kafka

# 1. Name the components on this agent
a1.sources = r_sensor r_log
a1.sinks = k_sensor k_log
a1.channels = c_sensor c_log

# 2. Configure the Source for Sensor Data
a1.sources.r_sensor.type = exec
a1.sources.r_sensor.command = tail -F /path/to/your/project/sensor_raw.log
# Optional: Ensure JSON formatting is kept clean
a1.sources.r_sensor.interceptors = i1
a1.sources.r_sensor.interceptors.i1.type = static
a1.sources.r_sensor.interceptors.i1.key = topic_type
a1.sources.r_sensor.interceptors.i1.value = sensor

# 3. Configure the Source for Log Data
a1.sources.r_log.type = exec
a1.sources.r_log.command = tail -F /path/to/your/project/log_raw.log
a1.sources.r_log.interceptors = i2
a1.sources.r_log.interceptors.i2.type = static
a1.sources.r_log.interceptors.i2.key = topic_type
a1.sources.r_log.interceptors.i2.value = log

# 4. Configure the Sink for Sensor Data (Kafka)
a1.sinks.k_sensor.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.k_sensor.kafka.topic = sensor_raw
a1.sinks.k_sensor.kafka.bootstrap.servers = master:9092,slave1:9092,slave2:9092
a1.sinks.k_sensor.kafka.flumeBatchSize = 20
a1.sinks.k_sensor.kafka.producer.acks = 1

# 5. Configure the Sink for Log Data (Kafka)
a1.sinks.k_log.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.k_log.kafka.topic = log_raw
a1.sinks.k_log.kafka.bootstrap.servers = master:9092,slave1:9092,slave2:9092
a1.sinks.k_log.kafka.flumeBatchSize = 20
a1.sinks.k_log.kafka.producer.acks = 1

# 6. Configure the Channels
# Use memory channel for fast processing
a1.channels.c_sensor.type = memory
a1.channels.c_sensor.capacity = 1000
a1.channels.c_sensor.transactionCapacity = 100

a1.channels.c_log.type = memory
a1.channels.c_log.capacity = 1000
a1.channels.c_log.transactionCapacity = 100

# 7. Bind the source and sink to the channel
a1.sources.r_sensor.channels = c_sensor
a1.sinks.k_sensor.channel = c_sensor

a1.sources.r_log.channels = c_log
a1.sinks.k_log.channel = c_log

# Command to run Flume (Run this in terminal after modifying the paths):
# bin/flume-ng agent --conf conf --conf-file conf/flume-kafka.conf --name a1 -Dflume.root.logger=INFO,console
