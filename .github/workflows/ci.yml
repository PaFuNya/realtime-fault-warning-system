# GitHub Actions CI 工作流
# 项目: OverMatch - 工业物联网实时数据处理引擎
# 触发条件: push / PR 到 main 分支

name: CI - Build & Test

on:
  push:
    branches: [ main, master, recover-branch ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  MAVEN_OPTS: -Dhttp.proxyHost= -Dhttps.proxyHost=
  JAVA_VERSION: '8'

jobs:
  # ========================================
  # Job 1: 编译检查
  # ========================================
  compile:
    name: 📦 Compile (Scala + Java)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Validate & Compile
        run: mvn clean compile -B -V
        env:
          MAVEN_CONFIG: -Dmaven.test.skip=true

  # ========================================
  # Job 2: 单元测试
  # ========================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run Unit Tests
        run: mvn test -B --no-transfer-progress
        continue-on-error: true  # 当前项目测试代码较少，允许失败继续

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ========================================
  # Job 3: 打包构建
  # ========================================
  package:
    name: 🏗️ Package (Shade JAR)
    runs-on: ubuntu-latest
    needs: [compile, test]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Build Shade JAR
        run: mvn clean package -DskipTests -B --no-transfer-progress

      - name: ✅ Verify JAR exists
        run: |
          JAR_FILE=$(find target/*.jar -name "realtime-data-process*jar-with-dependencies*" | head -1)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          if [ -z "$JAR_FILE" ]; then
            echo "❌ Shade JAR not found!"
            ls -la target/
            exit 1
          fi
          echo "✅ Built JAR: $JAR_FILE"
          du -sh "$JAR_FILE"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: overmatch-jar-${{ github.sha }}
          path: |
            target/*-jar-with-dependencies.jar
            target/*.jar
          retention-days: 30

  # ========================================
  # Job 4: 代码质量扫描 (可选)
  # ========================================
  code-quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    needs: compile
    if: github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🔍 Run Scalastyle (if configured)
        run: |
          if grep -q "scalastyle-maven-plugin" pom.xml; then
            mvn scalastyle:check -B || true
          else
            echo "⚠️ Scalastyle plugin not configured, skipping..."
          fi

      - name: 📋 Summary Report
        run: |
          echo "## 📊 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          SCALA_FILES=$(find src/main/scala -name "*.scala" 2>/dev/null | wc -l)
          TOTAL_LINES=$(find src/main/scala -name "*.scala" -exec cat {} \; 2>/dev/null | wc -l)
          echo "| Scala Files | $SCALA_FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Lines | $TOTAL_LINES |" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Job 5: 构建状态汇总
  # ========================================
  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [package, test, code-quality]
    if: always()
    steps:
      - name: 📋 Generate Summary
        run: |
          echo "## 🔨 CI Build Summary for OverMatch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Compile | ${{ needs.compile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ needs.package.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
